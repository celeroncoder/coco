name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-daemon:
    name: Build daemon (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            outfile: coco-agent-darwin-arm64
            archive: coco-agent-darwin-arm64.tar.gz
          - os: ubuntu-latest
            platform: linux-x64
            outfile: coco-agent-linux-x64
            archive: coco-agent-linux-x64.tar.gz
          - os: windows-latest
            platform: windows-x64
            outfile: coco-agent-windows-x64.exe
            archive: coco-agent-windows-x64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Build daemon (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: apps/daemon
        run: |
          mkdir -p dist
          bun build --compile src/index.ts --outfile dist/${{ matrix.outfile }}

      - name: Build daemon (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/daemon
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          bun build --compile src/index.ts --outfile dist/${{ matrix.outfile }}

      - name: Package (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: apps/daemon/dist
        run: tar -czf ${{ matrix.archive }} ${{ matrix.outfile }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/daemon/dist
        run: Compress-Archive -Path ${{ matrix.outfile }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: apps/daemon/dist/${{ matrix.archive }}

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build-daemon]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.0-${{ github.run_number }}
          name: v0.0.0-${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
